<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Вырасти дракончика</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: #2b5e2b;
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.4);
            max-width: 450px;
            width: 100%;
        }
        .pet-card {
            background: #f9e7b3;
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            box-shadow: inset 0 -5px 0 #c9a96b, 0 10px 20px rgba(0,0,0,0.2);
        }
        .avatar {
            font-size: 120px;
            filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.3));
            transition: transform 0.1s;
            cursor: pointer;
        }
        .avatar:active {
            transform: scale(0.95);
        }
        .name {
            font-size: 28px;
            font-weight: bold;
            background: white;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            margin: 10px 0;
            color: #4a2e1e;
        }
        .stats {
            background: #2e241f;
            border-radius: 30px;
            padding: 15px;
            margin: 15px 0;
            color: #ffefcf;
        }
        .stat {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 18px;
        }
        .hunger-bar {
            background: #5a3e2e;
            border-radius: 20px;
            height: 20px;
            overflow: hidden;
            margin-top: 5px;
        }
        .hunger-fill {
            background: #ff9800;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.3s;
        }
        button {
            background: #ffc107;
            border: none;
            padding: 14px 24px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 40px;
            margin: 8px;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 5px 0 #b26500;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b26500;
        }
        .reset-btn {
            background: #ff6b6b;
            color: white;
            box-shadow: 0 5px 0 #8b0000;
        }
        .message {
            margin-top: 15px;
            font-size: 16px;
            background: #00000088;
            padding: 8px;
            border-radius: 30px;
            color: #ffd966;
        }
        .stage {
            font-size: 14px;
            background: #00000066;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="pet-card">
        <div class="avatar" id="avatar">🥚</div>
        <div class="name">🐉 Дракоша</div>
        <div class="stage" id="stageLabel">Яйцо</div>

        <div class="stats">
            <div class="stat">
                <span>🍗 Сытость:</span>
                <span id="hungerPercent">100%</span>
            </div>
            <div class="hunger-bar">
                <div class="hunger-fill" id="hungerFill" style="width: 100%"></div>
            </div>
            <div class="stat">
                <span>📈 Возраст:</span>
                <span id="ageDisplay">0</span>
            </div>
        </div>

        <button id="feedBtn">🍎 Покормить (+25)</button>
        <br>
        <button id="resetBtn" class="reset-btn">🔄 Начать заново</button>
        <div class="message" id="message">🐣 Покорми меня, чтобы я вырос!</div>
    </div>
</div>

<script>
    // СОСТОЯНИЕ
    let hunger = 100;       // 0 = голоден, 100 = сыт
    let age = 0;            // сколько кормлений
    let growthStage = 0;    // 0=яйцо, 1=детёныш, 2=юный, 3=взрослый
    
    // Эмодзи для стадий
    const stageEmojis = ["🥚", "🐣", "🐲", "🐉"];
    const stageNames = ["Яйцо", "Детёныш", "Юный дракон", "Великий дракон"];
    
    // Элементы DOM
    const avatarEl = document.getElementById("avatar");
    const stageLabelEl = document.getElementById("stageLabel");
    const hungerPercentEl = document.getElementById("hungerPercent");
    const hungerFillEl = document.getElementById("hungerFill");
    const ageDisplayEl = document.getElementById("ageDisplay");
    const messageEl = document.getElementById("message");
    
    // Обновить интерфейс
    function updateUI() {
        // Сытость в процентах
        let percent = Math.max(0, hunger);
        hungerPercentEl.innerText = percent + "%";
        hungerFillEl.style.width = percent + "%";
        
        // Цвет полоски сытости
        if (percent < 30) {
            hungerFillEl.style.backgroundColor = "#f44336";
        } else if (percent < 70) {
            hungerFillEl.style.backgroundColor = "#ffc107";
        } else {
            hungerFillEl.style.backgroundColor = "#4caf50";
        }
        
        // Возраст (количество кормлений)
        ageDisplayEl.innerText = age;
        
        // Стадия роста на основе возраста
        let newStage = 0;
        if (age >= 12) newStage = 3;
        else if (age >= 6) newStage = 2;
        else if (age >= 2) newStage = 1;
        else newStage = 0;
        
        if (newStage !== growthStage) {
            growthStage = newStage;
            messageEl.innerText = `✨ ${stageNames[growthStage]} вырос! ✨`;
            setTimeout(() => {
                if (messageEl.innerText.includes("вырос"))
                    messageEl.innerText = "🍭 Продолжай кормить!";
            }, 2000);
        }
        
        avatarEl.innerText = stageEmojis[growthStage];
        stageLabelEl.innerText = stageNames[growthStage];
        
        // Если голодный — грустный вид (добавляем нюанс)
        if (hunger <= 10 && growthStage > 0) {
            if (!avatarEl.innerText.includes("💔")) {
                avatarEl.innerText = stageEmojis[growthStage] + "💔";
            }
        }
    }
    
    // Голод (уменьшение сытости каждые 5 секунд)
    function decreaseHunger() {
        if (hunger > 0) {
            hunger = Math.max(0, hunger - 8);
        }
        
        // Если голод 0 слишком долго — сброс (умер, начинаем заново)
        if (hunger === 0 && growthStage > 0) {
            messageEl.innerText = "💀 Дракоша умер от голода... Начнём сначала 💀";
            resetGame();
        } else {
            updateUI();
        }
    }
    
    // ПОКОРМИТЬ
    function feed() {
        if (hunger <= 0 && growthStage > 0) {
            messageEl.innerText = "😭 Слишком поздно... Нажми 'Начать заново'";
            return;
        }
        
        // Добавляем сытость (не больше 100)
        hunger = Math.min(100, hunger + 25);
        age++;
        
        updateUI();
        
        // Разные сообщения
        if (hunger >= 95) messageEl.innerText = "🍗 Дракоша сыт и счастлив!";
        else if (hunger >= 70) messageEl.innerText = "😋 Вкуснятина! Спасибо!";
        else if (hunger >= 40) messageEl.innerText = "😊 Ням-ням, растём!";
        else messageEl.innerText = "🍎 Ещё чуть-чуть!";
        
        // Финальная эволюция
        if (growthStage === 3 && age >= 12) {
            messageEl.innerText = "🐉🔥 Твой дракон стал легендарным! 🔥🐉";
        }
    }
    
    // СБРОС
    function resetGame() {
        hunger = 100;
        age = 0;
        growthStage = 0;
        updateUI();
        messageEl.innerText = "🌟 Новый дракончик ждёт твоей заботы! 🌟";
    }
    
    // Запуск таймера голода (каждые 5 секунд)
    setInterval(decreaseHunger, 5000);
    
    // Кнопки
    document.getElementById("feedBtn").addEventListener("click", feed);
    document.getElementById("resetBtn").addEventListener("click", resetGame);
    
    // Стартовое сообщение
    setTimeout(() => {
        messageEl.innerText = "🥚 Покорми яйцо 2 раза, и оно вылупится!";
    }, 500);
    
    // Анимация при клике на аватар (просто радость)
    avatarEl.addEventListener("click", () => {
        if (growthStage > 0 && hunger > 10) {
            messageEl.innerText = "🐉 Дракоша радуется твоему вниманию!";
            avatarEl.style.transform = "scale(1.1)";
            setTimeout(() => avatarEl.style.transform = "", 200);
        } else if (growthStage === 0) {
            messageEl.innerText = "🥚 Яйцо нужно кормить, чтобы оно вылупилось!";
        }
    });
</script>
</body>
</html>
